# Netlify Configuration for Frank Penney Injury Law Static Site

[build]
  # Build command to minify CSS and JS
  command = "npm run build"
  publish = "."

# Secrets scanning configuration
# DEEPL_API_TYPE is not a secret (just "free" or "paid"), so exclude it from scanning
# Note: Set DEEPL_API_KEY and DEEPL_API_TYPE in Netlify Dashboard under Site Settings > Environment Variables
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "DEEPL_API_TYPE"

# Scheduled Functions. v1-style (exports.handler) functions need the schedule
# declared here — inline `exports.config = { schedule }` only auto-registers
# for v2 functions (export default). Runs lead-form-worker every minute to
# drain the Blobs `inbox/` and POST queued leads to Netlify Forms.
[functions."lead-form-worker"]
  schedule = "* * * * *"

# 404 handling - Netlify automatically serves 404.html for missing pages
# No catch-all redirect needed for static HTML sites

# Custom headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.google-analytics.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://*.callrail.com https://casevalue.law https://*.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://*.google-analytics.com https://www.google.com https://a.storyblok.com https://pagead2.googlesyndication.com https://*.callrail.com https://fonts.gstatic.com https://casevalue.law https://*.clarity.ms https://c.bing.com; frame-src https://www.googletagmanager.com https://casevalue.law; connect-src 'self' https://*.google-analytics.com https://www.googletagmanager.com https://www.google.com https://api.storyblok.com https://pagead2.googlesyndication.com https://*.callrail.com https://casevalue.law https://*.clarity.ms https://c.bing.com; frame-ancestors 'self' https://app.storyblok.com; require-trusted-types-for 'script';"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/config/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Ensure robots.txt and sitemap.xml are served with correct content types
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# Redirects

# API: Google Ads Lead Form webhook → Netlify Function
# Rewrite (status 200) so the URL stays /api/lead-form-webhook for Google.
# Spec: webhook-spec-lead-form.md
[[redirects]]
  from = "/api/lead-form-webhook"
  to = "/.netlify/functions/lead-form-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/car-accident-lawyer"
  to = "/car-accidents.html"
  status = 301
  force = true

[[redirects]]
  from = "/car-accident-lawyer/*"
  to = "/lp/car-accident.html"
  status = 301
  force = true

