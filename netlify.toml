# Netlify Configuration for Frank Penney Injury Law Static Site

[build]
  # Build command to minify CSS and JS
  command = "npm run build"
  publish = "."

# Secrets scanning configuration
# DEEPL_API_TYPE is not a secret (just "free" or "paid"), so exclude it from scanning
# Note: Set DEEPL_API_KEY and DEEPL_API_TYPE in Netlify Dashboard under Site Settings > Environment Variables
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "DEEPL_API_TYPE"

# 404 handling - Netlify automatically serves 404.html for missing pages
# No catch-all redirect needed for static HTML sites

# Custom headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://cdn.callrail.com https://js.callrail.com https://casevalue.law; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://a.storyblok.com https://cdn.callrail.com https://fonts.gstatic.com; frame-src https://www.googletagmanager.com https://casevalue.law; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://www.google.com https://api.storyblok.com https://cdn.callrail.com https://api.callrail.com https://js.callrail.com https://casevalue.law;"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Ensure robots.txt and sitemap.xml are served with correct content types
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# Redirects
[[redirects]]
  from = "/car-accident-lawyer/*"
  to = "/lp/car-accident.html"
  status = 301
  force = true

# Blog post URL rewrite: /blog/post-slug -> /blog-post.html
[[redirects]]
  from = "/blog/*"
  to = "/blog-post.html"
  status = 200
  force = false

# Edge function for blog post meta tag injection
[[edge_functions]]
  function = "blog-meta"
  path = "/blog/*"

# Form notifications - Netlify will automatically detect forms with data-netlify="true"
# Configure email notifications in Netlify Dashboard under Forms > Form Notifications
