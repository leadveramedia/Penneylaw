<!-- Testimonials / Google Reviews Component -->
<!--
  Real, individually attributable Google reviews shown in a horizontal,
  scroll-snap carousel (3 visible at a time on desktop). Each .testimonial-text
  block is a verbatim excerpt of the client's review and is kept IDENTICAL to
  the matching Review JSON-LD on the homepage (index.html LegalService "review"
  array, same order). If you edit a quote here, update the corresponding
  reviewBody there so structured data matches visible text.
  DO NOT add aggregateRating JSON-LD for the firm's own rating (Google policy
  + CA Bar considerations). Carousel buttons are wired by initTestimonialsCarousel()
  in main.js. Loaded by component-loader.js into any page containing
  <div id="testimonials-placeholder"></div>.
-->
<section class="section bg-light testimonials" aria-labelledby="reviews-heading">
    <div class="container">
        <div class="section-header" data-reveal>
            <span class="section-subtitle">Client Reviews</span>
            <h2 id="reviews-heading" class="section-title heading-azure">What Our Clients Say</h2>

        </div>

            </button>
            <div class="testimonials-track" role="group" aria-label="Client reviews &mdash; scroll for more" tabindex="0">
