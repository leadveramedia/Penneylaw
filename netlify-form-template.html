<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Form Templates (DO NOT DELETE)</title>
</head>
<body>
    <!--
    This page contains form templates for Netlify Forms detection.
    Netlify needs to see these forms in the static HTML at build time.
    DO NOT DELETE THIS FILE.
    -->

    <!-- Modal Contact Form Template -->
    <form name="modal-contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input name="bot-field">
        <input name="form-name" value="modal-contact">
        <input name="subject">
        <input name="name">
        <input name="email" type="email">
        <input name="phone" type="tel">
        <input name="page-context">
        <textarea name="message"></textarea>
    </form>

    <!-- Existing contact form (for reference - already in contact.html and index.html) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input name="bot-field">
        <input name="form-name" value="contact">
        <input name="subject">
        <input name="name">
        <input name="email" type="email">
        <input name="phone" type="tel">
        <textarea name="message"></textarea>
    </form>

    <!-- Attorney referral form -->
    <form name="attorney-referral" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input name="bot-field">
        <input name="form-name" value="attorney-referral">
        <input name="subject">
        <input name="lead_type">
        <input name="firm_name">
        <input name="email" type="email">
        <input name="phone" type="tel">
        <textarea name="message"></textarea>
    </form>

    <!-- Google Ads Lead Form Asset (server-to-server submissions from netlify/functions/lead-form-worker.js) -->
    <form name="google-ads-lead" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input name="bot-field">
        <input name="form-name" value="google-ads-lead">
        <input name="name">
        <input name="phone" type="tel">
        <input name="email" type="email">
        <input name="accident_when">
        <input name="accident_type">
        <input name="injured">
        <input name="lead_id">
        <input name="campaign_id">
        <input name="ad_id">
        <input name="gcl_id">
        <input name="source">
        <textarea name="all_answers"></textarea>
    </form>
<script src="js/bundle.min.js?v=20260517" defer></script>
</body>
</html>
